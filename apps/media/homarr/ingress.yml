apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homarr-http
  namespace: media
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`homarr.thijsvdweijer.nl`)
      kind: Rule
      services:
        - name: homarr
          port: 7575
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homarr-https
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`homarr.thijsvdweijer.nl`)
      kind: Rule
      services:
        - name: homarr
          port: 7575
  tls:
    secretName: homarr-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homarr-tls
  namespace: media
spec:
  secretName: homarr-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - homarr.thijsvdweijer.nl
