apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
	      ports:
	        -  containerPort: 7878
          env:
	        - name: PUID
	          value: "0"
            - name: PGID
	          value: "0"
	        - name: TZ
              value: "Europe/Amsterdam"
	     volumeMounts:
	        - name: config
	          mountPath: /config
	        - name: downloads
              mountPath: /downloads
	        - name: movies
	          mountPath: /movies
      volumes:
	- name: config
          persistentVolumeClaim:
	     claimName: radarr-config
	- name: downloads
	  nfs: 
	    server: 192.168.178.59
	    path: /mnt/Storage_new/downloads
	- name: movies
          nfs: 
	    server: 192.168.178.59
	    path: /mnt/Storage_new/jellyfin/movies 
