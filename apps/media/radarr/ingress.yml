apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr-http
  namespace: media
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`radarr.thijsvdweijer.nl`)
      kind: Rule
      services:
        - name: radarr
	  port: 7878
---
apiVersion: treafik.io/v1alpha1
kind: IngressRoute
metadata: 
  name: radarr-https
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`radarr.thijsvdweijer.nl`)
      kind: Rule
      services:
        - name: radarr 
          port: 7878
  tls:
    secretName: radarr-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: radarr-tls
  namespace: media
spec:
  secretName: radarr-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - radarr.thijsvdweijer.nl



